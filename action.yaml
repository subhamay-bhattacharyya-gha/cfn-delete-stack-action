    - name: Delete CloudFormation Stack and Monitor Progress
      shell: bash
      run: |
        set -euo pipefail

        STACK_NAME="${{ inputs.stack-name }}"
        REGION="${{ inputs.aws-region }}"
        START_TIME=$(date +%s)
        TIMEOUT=600  # Optional: make this an input if needed

        echo "🚀 Initiating stack deletion: $STACK_NAME in $REGION"
        aws cloudformation delete-stack \
          --stack-name "$STACK_NAME" \
          --region "$REGION"

        echo "📡 Monitoring stack deletion..."

        while true; do
          if aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" > /dev/null 2>&1; then

            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$REGION" \
              --query "Stacks[0].StackStatus" \
              --output text)

            echo "Current status: $STATUS"

            if [[ "$STATUS" == "DELETE_FAILED" ]]; then
              echo "❌ Stack deletion failed with status: $STATUS"
              exit 1
            fi

          else
            echo "✅ Stack deletion completed successfully!"
            break
          fi

          CURRENT_TIME=$(date +%s)
          ELAPSED=$((CURRENT_TIME - START_TIME))

          if [[ $TIMEOUT -gt 0 && $ELAPSED -ge $TIMEOUT ]]; then
            echo "⏱️ Timeout reached after $ELAPSED seconds. Exiting..."
            exit 1
          fi

          sleep 5
        done

        echo "stack-name=$STACK_NAME" >> $GITHUB_OUTPUT
